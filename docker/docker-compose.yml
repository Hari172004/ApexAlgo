version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: antegravity-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: antegravity-bot
    restart: always
    env_file:
      - ../.env
    depends_on:
      - api
    command: python core.py

volumes:
  bot_logs:
